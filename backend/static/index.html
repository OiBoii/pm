<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP Backend Scaffold</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: var(--navy-dark);
      }

      main {
        max-width: 760px;
        margin: 64px auto;
        padding: 24px;
        background: white;
        border: 1px solid rgba(3, 33, 71, 0.1);
        border-radius: 16px;
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: #f3f5f9;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Hello World</p>
      <h1>Project Management MVP backend scaffold</h1>
      <p>This static page is being served by FastAPI at <code>/</code>.</p>
      <p>
        Try the API endpoint at <code>/api/hello</code> to validate backend API
        routing.
      </p>
    </main>
  </body>
</html>
